spring:
  application:
    name: damoa
  # MySQL (JPA/JDBC) — 환경변수로 주입, 로컬 기본값 제공
  datasource:
    url: ${DB_JDBC_URL:jdbc:mysql://localhost:3306/damoa}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  # MySQL (R2DBC)
  r2dbc:
    url: ${DB_R2DBC_URL:r2dbc:mysql://localhost:3306/damoa}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    open-in-view: false
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  # 배치 메타데이터 테이블 자동 생성 + 부팅 시 잡 자동실행 비활성
  batch:
    jdbc:
      initialize-schema: always
    job:
      enabled: false

server:
  port: ${SERVER_PORT:8080}
  # nginx/Cloudflare 프록시 뒤에서 동작하므로 forwarded 헤더 신뢰
  forward-headers-strategy: framework
