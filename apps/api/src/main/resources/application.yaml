spring:
  application:
    name: damoa
  # Use JDK dynamic proxies (interface-based) so @Transactional service impls
  # need not be open (Bazel build has no kotlin-spring/all-open plugin).
  aop:
    proxy-target-class: false
  # MySQL (JPA/JDBC) — 환경변수로 주입, 로컬 기본값 제공
  datasource:
    url: ${DB_JDBC_URL:jdbc:mysql://localhost:3306/damoa}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    open-in-view: false
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      repositories:
        enabled: false # Redis 는 StringRedisTemplate 으로만 사용
  # 배치 메타데이터 테이블 자동 생성 + 부팅 시 잡 자동실행 비활성
  batch:
    jdbc:
      initialize-schema: always
    job:
      enabled: false
  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 26MB

server:
  port: ${SERVER_PORT:8080}
  # nginx/Cloudflare 프록시 뒤에서 동작하므로 forwarded 헤더 신뢰
  forward-headers-strategy: framework

# talkmaker / DataGSM OAuth / JWT 설정
app:
  jwt-secret: ${JWT_SECRET:dev-only-secret-change-me-0123456789abcdef0123456789abcdef}
  frontend-url: ${APP_FRONTEND_URL:http://localhost:3000}
  attachment-ttl-days: ${ATTACHMENT_TTL_DAYS:30}
  s3:
    endpoint: ${S3_ENDPOINT:http://localhost:9000}
    region: ${S3_REGION:us-east-1}
    access-key: ${S3_ACCESS_KEY:}
    secret-key: ${S3_SECRET_KEY:}
    bucket: ${S3_BUCKET:talkmaker}
    public-base: ${S3_PUBLIC_BASE:http://localhost:8080}
  datagsm:
    auth-base: ${DATAGSM_AUTH_BASE:https://oauth.authorization.datagsm.kr}
    resource-base: ${DATAGSM_RESOURCE_BASE:https://oauth.resource.datagsm.kr}
    client-id: ${DATAGSM_CLIENT_ID:}
    client-secret: ${DATAGSM_CLIENT_SECRET:}
    redirect-uri: ${DATAGSM_REDIRECT_URI:http://localhost:8080/api/auth/datagsm/callback}
    scope: ${DATAGSM_SCOPE:}
