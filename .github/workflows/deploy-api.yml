name: Deploy API (home server)

on:
  push:
    branches: [main]
    paths:
      - "apps/api/**"
      - "bazel/**"
      - "tools/springboot/**"
      - "MODULE.bazel"
      - ".bazelrc"
      - ".bazelversion"
      - ".github/workflows/deploy-api.yml"
  workflow_dispatch:

concurrency:
  group: deploy-api
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # Bazel local_jdk 가 JAVA_HOME 을 통해 JDK 25 를 사용하도록 설정
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"

      - name: Set up Bazel
        uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          disk-cache: true
          repository-cache: true

      # Bazel 네이티브로 Spring Boot 실행 jar 빌드 (spring-boot-loader-tools Repackager).
      # 의존성이 BOOT-INF/lib 로 중첩되어 오토컨피그가 정상 동작한다.
      - name: Build Spring Boot jar (Bazel)
        run: bazel build //apps/api:boot_jar

      - name: Stage jar into deploy dir
        run: cp bazel-bin/apps/api/boot_jar.jar apps/api/deploy/app.jar

      - name: Deploy to home server
        uses: 8G4B/GSM-SV-Deploy@v1.2.1
        with:
          host: ${{ secrets.HOMESERVER_HOST }}
          port: "22"
          user: ${{ secrets.HOMESERVER_USER }}
          password: ${{ secrets.HOMESERVER_PASSWORD }}
          source_path: apps/api/deploy
          target_path: /Users/snowykte0426/deploy/damoa
          deployspec_path: apps/api/deploy/deployspec.yml
